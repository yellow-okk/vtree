<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>vtree</title>
        <style>
            body {
                margin: 0;
            }
            h1 {
                margin: 0 0;
            }
            p {
                margin: 0 0;
            }
            header {
                text-align: center;
                padding: 10px 0;
                background-color: #cdee92;
            }
            footer {
                text-align: center;
                background-color: #edacdb;
                padding: 12px 0;
            }
            #app {
                height: 80vh;
            }
            #controller {
                padding: 0;
                padding-top: 15px;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>vtree</h1>
            <div
                id="controller"
                style="display: flex; align-items: center; gap: 20px; justify-content: center"
            >
                <div style="display: flex; align-items: center; gap: 5px">
                    <input id="insertInput" style="width: 70px" type="number" />
                    <button id="insertBtn">Insert</button>
                </div>
                <div style="display: flex; align-items: center; gap: 5px">
                    <input id="deleteInput" type="number" style="width: 70px" />
                    <button id="deleteBtn">delete</button>
                </div>
                <div style="display: flex; align-items: center; gap: 5px">
                    <button id="clearBtn">clear</button>
                </div>
                <div style="display: flex; align-items: center; gap: 5px">
                    <label id="degreeLabel">度数选择</label>
                    <input id="degreeSlider" type="range" min="3" max="8" value="3" step="1" />
                    <span id="degreeValue">3</span>
                </div>
            </div>
        </header>
        <div id="app"></div>
        <script type="module" src="/src/main.js"></script>
        <footer>
            <p>i am a footer</p>
        </footer>
    </body>
</html>
